<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="One Piece">
<meta name="theme-color" content="#8d1f1f">
<title>One Piece - Guia sin relleno</title>
<link rel="icon" type="image/png" href="pngegg.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08131f;
    --surface: rgba(10, 23, 35, 0.86);
    --surface2: rgba(14, 32, 48, 0.96);
    --surface3: #173349;
    --border: rgba(242, 214, 151, 0.16);
    --accent: #f2c14e;
    --accent2: #ffe7a0;
    --canon: #f7f3e8;
    --filler: #de5a47;
    --mixed: #4aa3d9;
    --extra: #43b88f;
    --text: #f6ecd7;
    --text2: #b8c2cc;
    --radius: 16px;
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--bg); }

  /* LAYOUT */
  body {
    display:flex;
    flex-direction:column;
    font-family:'Barlow', sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(242,193,78,0.18), transparent 28%),
      radial-gradient(circle at 18% 18%, rgba(74,163,217,0.18), transparent 22%),
      linear-gradient(180deg, #11253a 0%, #08131f 44%, #061018 100%);
  }
  body::before,
  body::after {
    content:"";
    position:fixed;
    pointer-events:none;
    z-index:0;
  }
  body::before {
    width:340px;
    height:340px;
    top:-120px;
    right:-90px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(242,193,78,0.18), transparent 68%);
    filter:blur(8px);
  }
  body::after {
    left:-120px;
    bottom:8%;
    width:280px;
    height:280px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(155,29,32,0.18), transparent 70%);
    filter:blur(12px);
  }
  button,
  input {
    -webkit-appearance:none;
    appearance:none;
    touch-action:manipulation;
  }

  header {
    flex-shrink:0;
    background:
      linear-gradient(135deg, rgba(125, 20, 24, 0.95), rgba(22, 57, 83, 0.94)),
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    border-bottom: 1px solid rgba(255, 231, 160, 0.2);
    padding: 14px 16px 12px;
    position: relative;
    z-index: 10;
    box-shadow: var(--shadow);
  }
  header::after {
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent),
      repeating-linear-gradient(120deg, transparent 0 16px, rgba(255,255,255,0.02) 16px 18px);
    pointer-events:none;
  }
  .header-top {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    position:relative;
    z-index:1;
  }
  .logo-wrap {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }
.logo-mark {
  width:40px;
  height:40px;
  object-fit:contain;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,0.25));
  flex-shrink:0;
  }
.logo {
  font-family:'Bebas Neue', sans-serif;
  font-size:26px;
  letter-spacing:1.8px;
  color:#fff7df;
  line-height:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  }
  .logo span {
    color:rgba(255, 239, 196, 0.82);
    font-size:12px;
    font-family:'Barlow', sans-serif;
    font-weight:600;
    letter-spacing:0.6px;
    text-transform:uppercase;
    display:block;
    margin-top:4px;
  }
  .progress-pill {
    margin-left:auto;
    background: rgba(8, 19, 31, 0.64);
    border: 1px solid rgba(255, 231, 160, 0.2);
    border-radius: 999px;
    padding: 8px 14px;
    font-size:12px;
    font-weight:700;
    color: #fff1bb;
    white-space:nowrap;
    font-family:'Barlow Condensed', sans-serif;
    letter-spacing:0.8px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
  }

  /* SEARCH */
  .search-wrap { position:relative; margin-bottom:9px; z-index:1; }
  .search-wrap input {
    width:100%;
    background: rgba(9, 22, 34, 0.74);
    border: 1px solid rgba(255, 231, 160, 0.16);
    border-radius: 14px;
    padding: 12px 42px 12px 40px;
    color: #fff7e0;
    font-size:15px;
    font-family:'Barlow', sans-serif;
    outline:none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .search-wrap input:focus {
    border-color: rgba(242, 193, 78, 0.55);
    box-shadow: 0 0 0 3px rgba(242, 193, 78, 0.12);
    background: rgba(11, 28, 43, 0.88);
  }
  .search-wrap input::placeholder { color:rgba(214, 223, 232, 0.56); }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--accent2); font-size:15px; pointer-events:none; }
  .clear-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--accent2); font-size:18px; cursor:pointer; line-height:1; display:none; padding:6px; border-radius:50%; }
  .clear-btn.show { display:block; }

  /* FILTERS */
  .filters { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; position:relative; z-index:1; }
  .filters::-webkit-scrollbar { display:none; }
  .filter-btn {
    flex-shrink:0;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 231, 160, 0.15);
    background: rgba(8, 19, 31, 0.58);
    color: #dbe4ec;
    font-size:12px;
    font-weight:700;
    font-family:'Barlow Condensed', sans-serif;
    letter-spacing:0.7px;
    cursor:pointer;
    transition: all 0.15s ease;
    white-space:nowrap;
  }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#111; box-shadow:0 10px 20px rgba(242, 193, 78, 0.22); }
  .filter-btn.f-canon.active { background:var(--canon); border-color:var(--canon); color:#000; }
  .filter-btn.f-filler.active { background:var(--filler); border-color:var(--filler); color:#fff; }
  .filter-btn.f-mixed.active { background:var(--mixed); border-color:var(--mixed); color:#fff; }

  /* MAIN SCROLL */
  main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative; z-index:1; }

  /* CURRENT EP BANNER */
  #current-banner {
    margin: 14px 14px 6px;
    background:
      linear-gradient(135deg, rgba(142, 31, 31, 0.92), rgba(11, 30, 46, 0.96)),
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    border: 1px solid rgba(255, 231, 160, 0.18);
    border-radius:18px;
    padding:14px 14px 12px;
    display:none;
    box-shadow: var(--shadow);
  }
  #current-banner.show { display:block; }
  .banner-label { font-size:10px; font-weight:700; letter-spacing:1.2px; color:var(--accent2); font-family:'Barlow Condensed'; text-transform:uppercase; margin-bottom:4px; }
  .banner-ep { font-size:20px; font-weight:700; color:#fff; font-family:'Barlow Condensed'; }
  .banner-title { font-size:12px; color:rgba(246, 236, 215, 0.74); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .banner-actions { display:flex; gap:8px; margin-top:8px; }
  .banner-btn {
    flex:1; padding:10px 0; border-radius:12px; border:1px solid transparent; cursor:pointer;
    font-size:12px; font-weight:700; font-family:'Barlow Condensed'; letter-spacing:0.7px;
    transition: opacity 0.15s, transform 0.15s;
  }
  .banner-btn:active { opacity:0.7; }
  .btn-goto { background:var(--accent); color:#111; }
  .btn-prev { background:rgba(8, 19, 31, 0.64); color:var(--text2); border-color:rgba(255, 231, 160, 0.12); }
  .btn-next { background:rgba(8, 19, 31, 0.64); color:var(--accent2); border-color:rgba(255, 231, 160, 0.12); }

  /* SEASON GROUPS */
  .season-group { margin: 12px 0 0; }
  .season-header {
    padding: 10px 16px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer;
    user-select:none;
    position:sticky; top:0;
    background: linear-gradient(90deg, rgba(14, 32, 48, 0.96), rgba(10, 23, 35, 0.92));
    border-top: 1px solid rgba(255, 231, 160, 0.1);
    border-bottom: 1px solid rgba(255, 231, 160, 0.08);
    z-index:5;
    backdrop-filter: blur(10px);
  }
  .season-header:active { background:var(--surface2); }
  .season-name {
    font-family:'Barlow Condensed', sans-serif;
    font-size:14px; font-weight:700;
    color: #ffe7a0;
    letter-spacing:0.5px;
    flex:1;
    padding-right:8px;
    line-height:1.2;
  }
  .season-meta { font-size:11px; color:rgba(214, 223, 232, 0.68); white-space:nowrap; text-align:right; }
  .season-meta span { display:block; }
  .season-chevron { color:rgba(214, 223, 232, 0.62); font-size:12px; margin-left:8px; transition:transform 0.2s; flex-shrink:0; }
  .season-group.open .season-chevron { transform:rotate(180deg); }
  .season-episodes { display:none; }
  .season-group.open .season-episodes { display:block; }

  /* ARC LABEL */
  .arc-label {
    padding: 6px 16px 4px;
    font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:rgba(214, 223, 232, 0.62);
    font-family:'Barlow Condensed';
    background:transparent;
  }

  /* EPISODE ROW */
  .ep-row {
    display:flex;
    align-items:center;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255, 231, 160, 0.07);
    gap:10px;
    cursor:pointer;
    transition: background 0.1s;
    background: rgba(7, 18, 29, 0.58);
    position:relative;
  }
  .ep-row:active { background:rgba(18, 41, 59, 0.96); }
  .ep-row.current-ep { background: linear-gradient(90deg, rgba(242, 193, 78, 0.12), rgba(9, 22, 34, 0.78)); }
  .ep-row.watched { opacity:0.45; }

  .ep-num {
    font-family:'Barlow Condensed', sans-serif;
    font-size:16px; font-weight:700;
    min-width:36px;
    text-align:right;
    flex-shrink:0;
  }
  .ep-num.canon { color:var(--canon); }
  .ep-num.filler { color:var(--filler); }
  .ep-num.mixed { color:var(--mixed); }
  .ep-num.extra { color:var(--extra); }

  .ep-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:1px;
  }
  .ep-dot.canon { background:var(--canon); }
  .ep-dot.filler { background:var(--filler); }
  .ep-dot.mixed { background:var(--mixed); }
  .ep-dot.extra { background:var(--extra); }

  .ep-info { flex:1; min-width:0; }
  .ep-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ep-title.filler { color:rgba(214, 223, 232, 0.58); text-decoration:line-through; text-decoration-color:rgba(224,80,80,0.5); }
  .ep-sub { font-size:11px; color:rgba(214, 223, 232, 0.62); margin-top:3px; }
  .ep-badge {
    font-size:9px; font-weight:700; letter-spacing:0.8px;
    padding:2px 6px; border-radius:4px; flex-shrink:0;
    font-family:'Barlow Condensed';
    text-transform:uppercase;
  }
  .ep-badge.filler { background:rgba(224,80,80,0.15); color:var(--filler); border:1px solid rgba(224,80,80,0.2); }
  .ep-badge.mixed { background:rgba(80,144,232,0.15); color:var(--mixed); border:1px solid rgba(80,144,232,0.2); }
  .ep-badge.extra { background:rgba(64,192,128,0.15); color:var(--extra); border:1px solid rgba(64,192,128,0.2); }

  .current-marker {
    position:absolute; left:0; top:0; bottom:0;
    width:4px; background:linear-gradient(180deg, #ffe7a0, #f2c14e); border-radius:0 4px 4px 0;
  }
  .watch-check {
    width:40px; height:40px; border-radius:14px;
    border: 1.5px solid rgba(255, 231, 160, 0.16);
    background: rgba(12, 28, 42, 0.8); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:transparent; font-size:16px; font-weight:700;
    flex-shrink:0; transition: all 0.15s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .ep-row.watched .watch-check { background:rgba(242, 193, 78, 0.16); border-color:rgba(242, 193, 78, 0.26); color:#ffe7a0; }

  /* EPISODE DETAIL */
  #detail-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(3, 8, 14, 0.78);
    display:none; align-items:flex-end;
    backdrop-filter:blur(8px);
  }
  #detail-overlay.show { display:flex; }
  #detail-panel {
    width:100%;
    background:
      linear-gradient(180deg, rgba(16, 39, 57, 0.98), rgba(7, 18, 29, 0.99)),
      linear-gradient(140deg, rgba(242,193,78,0.06), transparent);
    border-radius:24px 24px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:82vh; overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid rgba(255, 231, 160, 0.16);
    box-shadow: 0 -18px 40px rgba(0,0,0,0.35);
  }
  #detail-overlay.show #detail-panel { transform:translateY(0); }
  .detail-handle { width:52px; height:5px; background:rgba(255, 231, 160, 0.24); border-radius:999px; margin:0 auto 20px; }
  .detail-type-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .detail-num { font-family:'Bebas Neue'; font-size:42px; color:var(--accent); line-height:1; }
  .detail-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:5px; font-family:'Barlow Condensed'; letter-spacing:0.5px; }
  .detail-title { font-size:17px; font-weight:700; color:#fff; line-height:1.3; margin-bottom:6px; }
  .detail-season { font-size:12px; color:rgba(214, 223, 232, 0.72); margin-bottom:14px; }
  .detail-info-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .detail-tag { background:rgba(255, 231, 160, 0.08); padding:5px 10px; border-radius:999px; font-size:12px; color:#fff1bb; font-family:'Barlow Condensed'; border:1px solid rgba(255, 231, 160, 0.1); }
  .detail-note {
    background:rgba(80,144,232,0.08);
    border:1px solid rgba(80,144,232,0.15);
    border-radius:12px; padding:12px 12px;
    font-size:12px; color:var(--text); line-height:1.5;
    margin-bottom:16px;
  }
  .detail-actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    position:sticky;
    bottom:calc(-1 * env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(7, 18, 29, 0), rgba(7, 18, 29, 0.92) 24%, rgba(7, 18, 29, 0.98) 100%);
    padding-top:14px;
    margin-top:16px;
  }
  .detail-action-btn {
    min-height:54px;
    padding:14px 12px; border-radius:14px; border:1px solid transparent; cursor:pointer;
    font-size:13px; font-weight:700; font-family:'Barlow Condensed'; letter-spacing:0.6px;
    transition:opacity 0.15s;
    box-shadow: 0 10px 18px rgba(0,0,0,0.16);
  }
  .detail-action-btn:active { opacity:0.7; }
  .btn-set-current { background:var(--accent); color:#111; }
  .btn-toggle-watch { background:rgba(16, 39, 57, 0.94); color:var(--text); border-color:rgba(255, 231, 160, 0.12); }
  .btn-mark-upto {
    background:linear-gradient(135deg, rgba(242, 193, 78, 0.98), rgba(255, 231, 160, 0.96));
    color:#231600;
    border:1px solid rgba(255, 231, 160, 0.34);
    min-height:60px;
    font-size:15px;
  }
  .btn-mark-upto { grid-column:1/-1; }
  .btn-close-detail { grid-column:1/-1; background:rgba(16, 39, 57, 0.9); color:rgba(214, 223, 232, 0.78); border-color:rgba(255, 231, 160, 0.1); }

  /* JUMP TO EP */
  .jump-wrap { padding:10px 14px 6px; display:flex; gap:8px; align-items:center; }
  .jump-wrap input {
    flex:1; background:rgba(8, 19, 31, 0.64); border:1px solid rgba(255, 231, 160, 0.12);
    border-radius:12px; padding:10px 12px; color:var(--text);
    font-size:15px; font-family:'Barlow'; outline:none;
  }
  .jump-btn {
    background:var(--accent); color:#111; border:none;
    border-radius:12px; padding:10px 16px;
    font-size:13px; font-weight:700; font-family:'Barlow Condensed';
    cursor:pointer; white-space:nowrap;
  }

  /* NO RESULTS */
  .no-results { text-align:center; padding:52px 20px; color:rgba(214, 223, 232, 0.78); font-size:14px; }

  /* STATS BAR */
  .stats-bar {
    padding: 10px 16px;
    display:flex; gap:16px;
    border-bottom:1px solid rgba(255, 231, 160, 0.08);
    background:rgba(5, 16, 26, 0.84);
    font-size:11px; font-family:'Barlow Condensed'; font-weight:600; letter-spacing:0.3px;
    flex-shrink:0;
    overflow-x:auto;
    scrollbar-width:none;
    position:relative;
    z-index:1;
  }
  .stats-bar::-webkit-scrollbar { display:none; }
  .stat { display:flex; align-items:center; gap:4px; }
  .stat-dot { width:7px; height:7px; border-radius:50%; }
  .stat-val { color:rgba(214, 223, 232, 0.72); }

  /* SCROLLED INDICATOR */
  .scroll-fab {
    position:fixed; bottom:20px; right:16px;
    width:52px; height:52px; border-radius:18px;
    background:linear-gradient(135deg, var(--accent), #ffe7a0); color:#111;
    border:none; cursor:pointer;
    font-size:20px; display:none; align-items:center; justify-content:center;
    box-shadow:0 14px 26px rgba(0,0,0,0.34);
    z-index:50;
    transition: transform 0.2s;
  }
  .scroll-fab.show { display:flex; }
  .scroll-fab:active { transform:scale(0.9); }
  @media (max-width: 720px) {
    .header-top { align-items:flex-start; }
    .logo { font-size:28px; }
    .progress-pill { padding:8px 12px; font-size:11px; }
    .banner-actions { flex-direction:column; }
    .detail-actions { grid-template-columns:1fr; }
    .btn-mark-upto,
    .btn-close-detail { grid-column:auto; }
  }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8d1f1f">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="One Piece">
<link rel="apple-touch-icon" href="icon-192.png">

</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-wrap">
      <img class="logo-mark" src="pngegg.png" alt="Logo de One Piece">
      <div class="logo">One Piece<span>Guia sin relleno para seguir el viaje</span></div>
    </div>
    <div class="progress-pill" id="progress-pill">EP 1 / 1158</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar episodio o nº..." inputmode="search">
    <button class="clear-btn" id="clear-btn">✕</button>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all">Todos</button>
    <button class="filter-btn f-canon" data-f="canon">Canon ✓</button>
    <button class="filter-btn f-filler" data-f="filler">Relleno ✕</button>
    <button class="filter-btn f-mixed" data-f="mixed">Mixto ↔</button>
    <button class="filter-btn" data-f="unwatched">No vistos</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-dot" style="background:var(--canon)"></div><span>Canon</span> <span class="stat-val" id="s-canon">1060</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--filler)"></div><span>Relleno</span> <span class="stat-val" id="s-filler">98</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--mixed)"></div><span>Mixto</span> <span class="stat-val" id="s-mixed">—</span></div>
  <div class="stat"><div class="stat-dot" style="background:#888"></div><span>Vistos</span> <span class="stat-val" id="s-watched">0</span></div>
</div>

<main id="main">
  <div id="current-banner" class="current-banner">
    <div class="banner-label">▶ Estoy en</div>
    <div class="banner-ep" id="banner-ep-num">—</div>
    <div class="banner-title" id="banner-ep-title">—</div>
    <div class="banner-actions">
      <button class="banner-btn btn-prev" id="banner-prev">◀ Anterior</button>

// =============================================
// STATE
// =============================================
let state = {
  currentEp: 612,
  watched: new Set(),
  filter: 'all',
  search: ''
};

function loadState() {
  try {
    const raw = localStorage.getItem('op_state');
    if (raw) {
      const s = JSON.parse(raw);
      state.currentEp = s.currentEp || 612;
      state.watched = new Set(s.watched || []);
    } else {
      // Primera carga: marcar 1-611 como vistos
      state.currentEp = 612;
      state.watched = new Set(Array.from({length: 611}, (_, i) => i + 1));
      saveState();
    }
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('op_state', JSON.stringify({
    currentEp: state.currentEp,
    watched: [...state.watched]
  }));
}

loadState();

// Flat episode list
const allEps = SEASONS.flatMap(s => s.eps.map(e => ({...e, seasonId: s.id, seasonName: s.name})));

// =============================================
// RENDER
// =============================================
function getEpById(n) { return allEps.find(e => e.n === n); }

function renderBanner() {
  const ep = getEpById(state.currentEp);
  const banner = document.getElementById('current-banner');
  if (!ep) { banner.classList.remove('show'); return; }
  banner.classList.add('show');
  document.getElementById('banner-ep-num').textContent = `Episodio ${String(ep.n).padStart(3,'0')} — ${ep.tp === 'filler' ? '⚡ RELLENO' : ep.tp === 'mixed' ? '↔ MIXTO' : '✓ CANON'}`;
  document.getElementById('banner-ep-title').textContent = ep.t;
}

function updateProgress() {
  const ep = getEpById(state.currentEp);
  document.getElementById('progress-pill').textContent = `EP ${state.currentEp} / 1158`;
  document.getElementById('s-watched').textContent = state.watched.size;
}

function typeColor(tp) {
  return {canon:'canon',filler:'filler',mixed:'mixed',extra:'extra'}[tp]||'canon';
}
function typeBadge(tp) {
  if(tp==='filler') return '<span class="ep-badge filler">RELLENO</span>';
  if(tp==='mixed') return '<span class="ep-badge mixed">MIXTO</span>';
  if(tp==='extra') return '<span class="ep-badge extra">EXTRA</span>';
  return '';
}

function filterEps(eps) {
  return eps.filter(ep => {
    const f = state.filter;
    if(f==='canon' && ep.tp!=='canon') return false;
    if(f==='filler' && ep.tp!=='filler') return false;
    if(f==='mixed' && ep.tp!=='mixed') return false;
    if(f==='unwatched' && state.watched.has(ep.n)) return false;
    if(state.search) {
      const q = state.search.toLowerCase();
      const numMatch = String(ep.n).includes(state.search);
      const titleMatch = ep.t.toLowerCase().includes(q);
      const arcMatch = (ep.arc||'').toLowerCase().includes(q);
      if(!numMatch && !titleMatch && !arcMatch) return false;
    }
    return true;
  });
}

function renderList() {
  const container = document.getElementById('episode-list');
  let html = '';
  let lastArc = null;
  let hasResults = false;

  for(const season of SEASONS) {
    const visible = filterEps(season.eps);
    if(!visible.length) continue;
    hasResults = true;

    // Group by arc
    const arcGroups = {};
    for(const ep of visible) {
      if(!arcGroups[ep.arc]) arcGroups[ep.arc] = [];
      arcGroups[ep.arc].push(ep);
    }

    const isOpen = !state.search ? visible.some(e=>e.n===state.currentEp) : true;
    html += `<div class="season-group ${isOpen?'open':''}" data-sid="${season.id}">
      <div class="season-header" onclick="toggleSeason(${season.id})">
        <div class="season-name">${season.name}</div>
        <div class="season-meta">
          <span>${season.range}</span>
        </div>
        <div class="season-chevron">▼</div>
      </div>
      <div class="season-episodes">`;

    for(const [arc, eps] of Object.entries(arcGroups)) {
      html += `<div class="arc-label">${arc}</div>`;
      for(const ep of eps) {
        const isCurrent = ep.n === state.currentEp;
        const isWatched = state.watched.has(ep.n);
        const tc = typeColor(ep.tp);
        html += `<div class="ep-row ${isCurrent?'current-ep':''} ${isWatched?'watched':''}" 
          onclick="openDetail(${ep.n})" data-ep="${ep.n}" id="ep-${ep.n}">
          ${isCurrent?'<div class="current-marker"></div>':''}
          <div class="ep-num ${tc}">${String(ep.n).padStart(3,'0')}</div>
          <div class="ep-dot ${tc}"></div>
          <div class="ep-info">
            <div class="ep-title ${ep.tp==='filler'?'filler':''}">${ep.t}</div>
            ${ep.start && ep.start!=='—' ? `<div class="ep-sub">▶ Desde ${ep.start}</div>` : ''}
          </div>
          ${typeBadge(ep.tp)}
          <button class="watch-check" type="button" aria-label="Marcar episodio ${ep.n} como visto" onclick="event.stopPropagation();toggleWatch(${ep.n})">${isWatched?'✓':''}</button>
        </div>`;
      }
    }
    html += `</div></div>`;
  }

  if(!hasResults) {
    html = '<div class="no-results">🏴‍☠️ No se encontraron episodios</div>';
  }
  container.innerHTML = html;
}

function toggleSeason(sid) {
  const el = document.querySelector(`.season-group[data-sid="${sid}"]`);
  if(el) el.classList.toggle('open');
}

function scrollToCurrentEp() {
  const el = document.getElementById(`ep-${state.currentEp}`);
  if(el) {
    el.scrollIntoView({behavior:'smooth', block:'center'});
  } else {
    // Open the season containing current ep
    const ep = getEpById(state.currentEp);
    if(ep) {
      const sg = document.querySelector(`.season-group[data-sid="${ep.seasonId}"]`);
      if(sg) { sg.classList.add('open'); setTimeout(()=>scrollToCurrentEp(),100); }
    }
  }
}

// =============================================
// DETAIL
// =============================================
let detailEpN = null;

function openDetail(n) {
  const ep = getEpById(n);
  if(!ep) return;
  detailEpN = n;
  const tc = typeColor(ep.tp);
  const badgeLabels = {canon:'Canon',filler:'Relleno',mixed:'Mixto',extra:'Extra'};
  const badgeColors = {canon:'background:rgba(232,232,240,0.1);color:var(--canon)',filler:'background:rgba(224,80,80,0.15);color:var(--filler)',mixed:'background:rgba(80,144,232,0.15);color:var(--mixed)',extra:'background:rgba(64,192,128,0.15);color:var(--extra)'};
  document.getElementById('d-num').textContent = String(n).padStart(3,'0');
  document.getElementById('d-badge').textContent = badgeLabels[ep.tp];
  document.getElementById('d-badge').style.cssText = badgeColors[ep.tp];
  document.getElementById('d-title').textContent = ep.t;
  document.getElementById('d-season').textContent = `${ep.seasonName} · ${ep.arc||''}`;
  let infoHtml = '';
  if(ep.start && ep.start!=='—') infoHtml += `<div class="detail-tag">▶ Desde ${ep.start}</div>`;
  infoHtml += `<div class="detail-tag">EP ${n}</div>`;
  document.getElementById('d-info').innerHTML = infoHtml;
  const noteEl = document.getElementById('d-note');
  if(ep.note) { noteEl.style.display='block'; noteEl.textContent = '📝 ' + ep.note; }
  else noteEl.style.display='none';
  const tw = document.getElementById('d-toggle-watch');
  tw.textContent = state.watched.has(n) ? 'Marcar no visto' : 'Marcar visto';
  const sc = document.getElementById('d-set-current');
  sc.textContent = n === state.currentEp ? 'Aqui estoy' : 'Estoy aqui';
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
}

document.getElementById('d-close').onclick = closeDetail;
document.getElementById('detail-overlay').onclick = (e) => {
  if(e.target === document.getElementById('detail-overlay')) closeDetail();
};

document.getElementById('d-set-current').onclick = () => {
  state.currentEp = detailEpN;
  saveState();
  renderBanner();
  updateProgress();
  closeDetail();
  renderList();
  setTimeout(()=>scrollToCurrentEp(), 150);
};

document.getElementById('d-mark-upto').onclick = () => {
  if(!confirm(`¿Marcar como vistos todos los episodios del 1 al ${detailEpN}?`)) return;
  allEps.forEach(ep => { if(ep.n <= detailEpN) state.watched.add(ep.n); });
  saveState();
  updateProgress();
  closeDetail();
  renderList();
};

document.getElementById('d-toggle-watch').onclick = () => {
  toggleWatch(detailEpN);
  const tw = document.getElementById('d-toggle-watch');
  tw.textContent = state.watched.has(detailEpN) ? 'Marcar no visto' : 'Marcar visto';
};

function toggleWatch(n) {
  if(state.watched.has(n)) state.watched.delete(n);
  else state.watched.add(n);
  saveState();
  updateProgress();
  // Update just this row
  const row = document.getElementById(`ep-${n}`);
  if(row) {
    row.classList.toggle('watched', state.watched.has(n));
    const btn = row.querySelector('.watch-check');
    if(btn) btn.textContent = state.watched.has(n) ? '✓' : '';
  }
}

// =============================================
// BANNER ACTIONS
// =============================================
document.getElementById('banner-goto').onclick = scrollToCurrentEp;
document.getElementById('banner-prev').onclick = () => {
  if(state.currentEp > 1) { state.currentEp--; saveState(); renderBanner(); updateProgress(); renderList(); setTimeout(scrollToCurrentEp,150); }
};
document.getElementById('banner-next').onclick = () => {
  if(state.currentEp < 1158) { state.currentEp++; saveState(); renderBanner(); updateProgress(); renderList(); setTimeout(scrollToCurrentEp,150); }
};

// =============================================
// SEARCH & FILTERS
// =============================================
const searchInput = document.getElementById('search-input');
const clearBtn = document.getElementById('clear-btn');

searchInput.oninput = () => {
  state.search = searchInput.value.trim();
  clearBtn.classList.toggle('show', !!state.search);
  renderList();
};
clearBtn.onclick = () => {
  searchInput.value = '';
  state.search = '';
  clearBtn.classList.remove('show');
  renderList();
};

document.getElementById('filters').onclick = (e) => {
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.filter = btn.dataset.f;
  renderList();
};

// =============================================
// FAB
// =============================================
const fab = document.getElementById('scroll-fab');
fab.onclick = scrollToCurrentEp;

document.getElementById('main').addEventListener('scroll', (e) => {
  const el = document.getElementById(`ep-${state.currentEp}`);
  if(!el) { fab.classList.add('show'); return; }
  const rect = el.getBoundingClientRect();
  const inView = rect.top > 0 && rect.bottom < window.innerHeight;
  fab.classList.toggle('show', !inView);
});

// =============================================
// INIT
// =============================================
renderBanner();
updateProgress();
renderList();
setTimeout(()=>scrollToCurrentEp(), 300);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
